<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Loading Images Example</title>
    <script src="./assets/scripts/jszip.js"></script>
    <style>
        [cw-image] {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 20px;
            display: inline-block;
        }

        [cw-image] svg,
        [cw-image] img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transition: opacity 1.2s ease, filter 1.2s ease;
        }

        [cw-image] svg {
            filter: blur(10px);
            opacity: 1;
        }

        [cw-image] img {
            opacity: 0;
        }

        [cw-image] svg.fade-out {
            filter: blur(0);
            opacity: 0;
        }

        [cw-image] img.fade-in {
            opacity: 1;
        }
    </style>
</head>
