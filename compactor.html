<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimized Image Zip Converter & Resizer</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 40px;
        background: #fafafa;
      }
      h1 {
        text-align: center;
      }
      input[type="file"] {
        display: block;
        margin: 20px auto;
      }
      #imageGrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }
      .image-card {
        background: #fff;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      .image-card img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 6px;
      }
      .controls input {
        width: 60px;
        text-align: center;
      }
      .checkbox-row {
        margin-top: 5px;
      }
      button {
        display: block;
        margin: 40px auto;
        padding: 10px 20px;
        font-size: 1rem;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled {
        background-color: #888;
      }
    </style>
  </head>
  <body>
    <h1>Optimized Image Zip Converter & Resizer</h1>
    <input type="file" id="zipInput" accept=".zip" />
    <div id="imageGrid"></div>
    <button id="processBtn" disabled>Process and Download Zips</button>

    <script>
      const zipInput = document.getElementById("zipInput");
      const imageGrid = document.getElementById("imageGrid");
      const processBtn = document.getElementById("processBtn");
      let imageEntries = [];

      async function getImageDimensions(file) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            resolve({ width: img.width, height: img.height });
          };
          img.src = URL.createObjectURL(file);
        });
      }

      // Generic canvas resize and format convert
      async function resizeAndConvertImage(file, width, height, format) {
        const img = await createImageBitmap(file);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);

        const quality =
          format === "webp" || format === "avif" ? 0.82 : undefined;
        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, `image/${format}`, quality)
        );
        return blob;
      }

      zipInput.addEventListener("change", async (e) => {
        imageGrid.innerHTML = "";
        imageEntries = [];
        const file = e.target.files[0];
        if (!file) return;

        const jszip = new JSZip();
        const loadedZip = await jszip.loadAsync(file);

        const imageFiles = Object.values(loadedZip.files).filter(
          (f) =>
            !f.dir &&
            /\.(jpe?g|png|gif|webp|bmp|tiff|avif|heic|heif)$/i.test(f.name)
        );
        for (const entry of imageFiles) {
          try {
            const blob = await entry.async("blob");
            const fileObj = new File([blob], entry.name);
            const preview = URL.createObjectURL(fileObj);
            const dims = await getImageDimensions(fileObj);

            const card = document.createElement("div");
            card.className = "image-card";
            card.innerHTML = `
              <img src="${preview}" alt="${entry.name}">
              <div class="controls">
                <label>W <input type="number" value="${dims.width}" class="img-width"></label>
                <label>H <input type="number" value="${dims.height}" class="img-height"></label>
              </div>
              <div class="checkbox-row">
                <label><input type="checkbox" class="include-check" checked> Include</label>
              </div>
              <div class="filename" style="font-size:0.8em; margin-top:4px;">${entry.name}</div>
            `;
            imageGrid.appendChild(card);

            const baseName = entry.name.split("/").pop();
            imageEntries.push({ fileObj, card, name: baseName });
          } catch (err) {
            console.warn("Preview failed for", entry.name, err);
          }
        }
        processBtn.disabled = imageEntries.length === 0;
      });

      async function processAndDownload(format) {
        const newZip = new JSZip();

        for (const entry of imageEntries) {
          const include = entry.card.querySelector(".include-check").checked;
          if (!include) continue;
          const width = parseInt(entry.card.querySelector(".img-width").value);
          const height = parseInt(entry.card.querySelector(".img-height").value);

          const file = entry.fileObj;
          const originalExt = entry.name.split(".").pop().toLowerCase();

          let blob;
          const sizeMatch = await getImageDimensions(file);
          const sameDimensions =
            sizeMatch.width === width && sizeMatch.height === height;

          // 1️⃣ If output format equals source & same dimension => no reencode
          if (originalExt === format && sameDimensions) {
            blob = file;
          } else {
            // 2️⃣ Need reencode (resize and/or convert)
            blob = await resizeAndConvertImage(file, width, height, format);
          }

          // add with flattened name
          const basename = entry.name.split("/").pop().replace(/\.[^.]+$/, "");
          const outName = `${basename}.${format}`;
          newZip.file(outName, blob);
        }

        const zipBlob = await newZip.generateAsync({ type: "blob" });
        saveAs(zipBlob, `${format}-images.zip`);
      }

      processBtn.addEventListener("click", async () => {
        processBtn.disabled = true;
        processBtn.textContent = "Optimizing...";
        await processAndDownload("avif");
        await processAndDownload("webp");
        await processAndDownload("png");
        processBtn.textContent = "Process and Download Zips";
        processBtn.disabled = false;
      });
    </script>
  </body>
</html>
